<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heatmap & Coldspot</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: #000;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  color: #fff;
}
#app {
  background: #000;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 50px;
}
h1 {
  color: #fff;
  font-size: 30px;
  font-weight: 400;
  letter-spacing: 2px;
  text-align: center;
  padding: 32px 0 20px;
  width: 100%;
}

/* MAIN ROW */
#main-row {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  width: 100%;
  max-width: 1020px;
  padding: 0 12px;
  gap: 0;
}

/* LEFT PANEL */
#left-panel {
  width: 300px;
  flex-shrink: 0;
  position: relative;
  overflow: visible;
}

#cong-title {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 5px;
  padding-left: 2px;
}

/* 축 레이블 행 */
#axis-header {
  position: relative;
  height: 20px;
  width: 100%;
  margin-bottom: 0;
}
#axis-label-left {
  position: absolute;
  font-size: 10px;
  color: #888;
  top: 4px;
}
#axis-label-right {
  position: absolute;
  font-size: 10px;
  color: #888;
  top: 4px;
}

/* 점 차트 + 세로선 컨테이너 */
#chart-wrap {
  position: relative;
  width: 100%;
  /* 높이는 dot-chart 높이와 동일하게 JS로 맞춤 */
}

/* 세로 가이드선 5개 */
#vlines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}
.vline {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(255,255,255,0.13);
}

/* 점 차트 */
#dot-chart {
  position: relative;
  height: 790px;
  width: 100%;
  z-index: 1;
}

.place-row {
  position: absolute;
  left: 0;
  width: 100%;
  height: 16px;
  display: flex;
  align-items: center;
  cursor: pointer;
  z-index: 2;
}

.p-dot {
  width: 15px;
  height: 15px;
  border-radius: 50%;
  flex-shrink: 0;
  position: absolute;
  z-index: 4;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
}
.place-row:hover .p-dot {
  transform: scale(1.4);
  box-shadow: 0 0 10px rgba(255,255,255,0.22);
}

.p-hline {
  position: absolute;
  height: 1px;
  top: 7px;
  z-index: 3;
}

.p-label {
  position: absolute;
  font-size: 9.5px;
  color: #b0b0b0;
  white-space: nowrap;
  line-height: 1.2;
  pointer-events: none;
  z-index: 3;
}
.p-label.hot { color: #ff7788; }

/* MAP */
#map-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
}
#map-img {
  width: 100%;
  height: auto;
  display: block;
}
#map-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.mdg {
  cursor: pointer;
  pointer-events: all;
}
.mdg circle {
  transition: r 0.2s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
}

/* TOOLTIP */
#tt {
  position: fixed;
  display: none;
  opacity: 0;
  background: rgba(5,5,5,0.97);
  border: 1px solid #3a3a3a;
  border-radius: 10px;
  padding: 13px 16px;
  z-index: 9999;
  pointer-events: none;
  min-width: 185px;
  transition: opacity 0.15s ease;
}
#tt.vis { opacity: 1; }
.tt-name { font-size:13px; font-weight:700; color:#fff; margin-bottom:7px; line-height:1.4; }
.tt-row { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
.tt-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.tt-lbl { font-size:11px; color:#aaa; }
.tt-bar-bg { background:#222; border-radius:3px; height:4px; width:100%; margin-top:6px; overflow:hidden; }
.tt-bar-fill { height:100%; border-radius:3px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
.tt-pct { font-size:10px; color:#666; margin-top:4px; }

/* GRADIENT BAR */
#bar-wrap {
  width: 100%;
  max-width: 1020px;
  padding: 18px 12px 0 12px;
}
#grad-bar {
  width: 100%;
  height: 22px;
  border-radius: 2px;
  background: linear-gradient(to right, #2222aa 0%, #6633bb 20%, #cc3388 45%, #ee4422 70%, #cc3333 100%);
  cursor: crosshair;
  position: relative;
}
#bar-cursor {
  position: absolute;
  top: -5px;
  width: 2px;
  height: 32px;
  background: rgba(255,255,255,0.88);
  border-radius: 1px;
  pointer-events: none;
  display: none;
  transform: translateX(-50%);
  box-shadow: 0 0 6px rgba(255,255,255,0.4);
}
#bar-pop {
  position: absolute;
  bottom: 32px;
  background: rgba(5,5,5,0.97);
  border: 1px solid #444;
  border-radius: 10px;
  padding: 10px 14px;
  min-width: 200px;
  display: none;
  pointer-events: none;
  transform: translateX(-50%);
  z-index: 200;
}
#bar-pop .bp-hd {
  font-size: 9.5px; color:#666; letter-spacing:0.8px;
  text-transform: uppercase; border-bottom:1px solid #1e1e1e;
  padding-bottom:6px; margin-bottom:7px;
}
.bp-row {
  display:flex; align-items:center; gap:7px; margin-bottom:5px;
  opacity:0; transform:translateY(5px);
  animation: bpIn 0.22s ease forwards;
}
@keyframes bpIn { to { opacity:1; transform:translateY(0); } }
.bp-stick { width:16px; height:1px; background:#555; flex-shrink:0; }
.bp-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.bp-nm { font-size:11px; color:#ddd; line-height:1.3; }

/* LEGEND */
#legend {
  position:absolute; bottom:14px; right:8px;
  display:flex; flex-direction:column; gap:5px;
}
.lg-row { display:flex; align-items:center; gap:5px; }
.lg-dot { width:11px; height:11px; border-radius:50%; }
.lg-txt { font-size:10px; color:#aaa; }
</style>
</head>

<script>
const PLACES = [
  { id:"hokkaido",  name:"홋카이도 모에레누마 공원",        type:"hot",  cong:0.72, top:42,  mx:358,my:82,  color:"#ff4466" },
  { id:"akita",     name:"아키타 아키타현립미술관",          type:"cold", cong:0.32, top:130, mx:318,my:200, color:"#8877cc" },
  { id:"niigata",   name:"니가타 에치고쓰마리 대지예술제",   type:"cold", cong:0.38, top:246, mx:340,my:310, color:"#9988bb" },
  { id:"ishikawa",  name:"이시카와 21세기미술관",            type:"cold", cong:0.42, top:296, mx:292,my:370, color:"#aa99cc" },

  { id:"chiba",     name:"치바DIC 가와무라 기념미술관",      type:"hot",  cong:0.65, top:354, mx:383,my:428, color:"#ff4466" },
  { id:"kanagawa",  name:"가나가와 가마쿠라 근대미술관",     type:"hot",  cong:0.66, top:368, mx:372,my:442, color:"#ff4466" },
  { id:"toyama",    name:"도야마도야마현미술관",             type:"cold", cong:0.36, top:384, mx:306,my:396, color:"#9988bb" },
  { id:"fukui",     name:"후쿠이 에치젠도자기 마을",         type:"cold", cong:0.33, top:398, mx:292,my:410, color:"#9988cc" },
  { id:"shiga",     name:"시가미호류지엔",                   type:"cold", cong:0.39, top:414, mx:276,my:462, color:"#9988cc" },
  { id:"tottori",   name:"돗토리 돗토리사구박물관",          type:"cold", cong:0.34, top:430, mx:248,my:475, color:"#9988cc" },
  { id:"kyoto",     name:"교토 교세라 미술관",               type:"hot",  cong:0.74, top:444, mx:296,my:492, color:"#ff2244" },

  { id:"osaka",     name:"오사카 국립국제미술관",             type:"hot",  cong:0.67, top:472, mx:276,my:518, color:"#ff4455" },
  { id:"nara",      name:"나라 도다이지",                    type:"hot",  cong:0.72, top:486, mx:287,my:530, color:"#ff3344" },
  { id:"wakayama",  name:"와카야마구마노 고도",               type:"cold", cong:0.25, top:500, mx:270,my:546, color:"#7766cc" },
  { id:"kagawa",    name:"가가와 지추미술관",                type:"cold", cong:0.30, top:514, mx:256,my:562, color:"#8877bb" },
  { id:"yamaguchi", name:"야마구치 이와쿠니 킨타이교",       type:"cold", cong:0.27, top:526, mx:218,my:574, color:"#7766cc" },
  { id:"tokushima", name:"도쿠시마오쓰카 국제미술관",        type:"cold", cong:0.29, top:538, mx:246,my:586, color:"#8877bb" },
  { id:"fukuoka",   name:"후쿠오카 후쿠오카 아시아미술관",   type:"hot",  cong:0.61, top:580, mx:182,my:634, color:"#ff5566" },
  { id:"oita",      name:"오이타 OPAM",                     type:"cold", cong:0.20, top:600, mx:208,my:656, color:"#6655cc" },
  { id:"okinawa",   name:"오키나와 슈리 성",                 type:"hot",  cong:0.56, top:732, mx:178,my:862, color:"#ff6677" },
];

const pMap = {};
PLACES.forEach(p => pMap[p.id] = p);

// ── 레이아웃 상수 ──────────────────────────────────
const AX_LEFT  = 4;    // 축 시작 x (px) — 가장 왼쪽 세로선 위치
const AX_RIGHT = 172;  // 축 끝 x (px)   — 가장 오른쪽 세로선 위치
const LABEL_X  = 180;  // 레이블 시작 x
const DOT_D    = 15;
const DOT_R    = DOT_D / 2;
const N_LINES  = 5;    // 세로선 개수

// ── 축 레이블 위치 설정 ───────────────────────────
document.getElementById('axis-label-left').style.left  = AX_LEFT + 'px';
document.getElementById('axis-label-right').style.left = (AX_RIGHT - 42) + 'px';

// ── 세로 가이드선 5개 위치 ────────────────────────
// 0%, 25%, 50%, 75%, 100% 위치에 배치
for (let i = 0; i < N_LINES; i++) {
  const t = i / (N_LINES - 1);   // 0, 0.25, 0.5, 0.75, 1
  const xPx = AX_LEFT + t * (AX_RIGHT - AX_LEFT);
  const vl = document.getElementById('vl' + i);
  vl.style.left = xPx + 'px';
}

// ── 점 차트 생성 ──────────────────────────────────
const dotChart = document.getElementById('dot-chart');

PLACES.forEach(p => {
  const row = document.createElement('div');
  row.className = 'place-row';
  row.style.top = p.top + 'px';

  // dot 중심 x
  const dotCX = AX_LEFT + p.cong * (AX_RIGHT - AX_LEFT);
  const dotLeft = dotCX - DOT_R;

  // 수평 연결선: dot 오른쪽 끝 → LABEL_X
  const lineLeft  = dotCX + DOT_R;
  const lineRight = LABEL_X - 2;
  if (lineRight > lineLeft) {
    const hline = document.createElement('div');
    hline.className = 'p-hline';
    hline.style.left   = lineLeft + 'px';
    hline.style.width  = (lineRight - lineLeft) + 'px';
    hline.style.background = p.type === 'hot'
      ? 'rgba(255,80,100,0.30)'
      : 'rgba(150,138,200,0.22)';
    row.appendChild(hline);
  }

  // dot
  const dot = document.createElement('div');
  dot.className = 'p-dot';
  dot.style.left   = dotLeft + 'px';
  dot.style.width  = DOT_D + 'px';
  dot.style.height = DOT_D + 'px';
  dot.style.background = p.color;
  row.appendChild(dot);

  // 레이블
  const lbl = document.createElement('div');
  lbl.className = 'p-label' + (p.type === 'hot' ? ' hot' : '');
  lbl.textContent = p.name;
  lbl.style.left = LABEL_X + 'px';
  row.appendChild(lbl);

  row.addEventListener('mouseenter', e => { showTT(e, p); hlMap(p.id, true); });
  row.addEventListener('mousemove',  moveTT);
  row.addEventListener('mouseleave', () => { hideTT(); hlMap(p.id, false); });

  dotChart.appendChild(row);
});

// ── 지도 dots ─────────────────────────────────────
const mapDots = document.getElementById('map-dots');

PLACES.forEach(p => {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.classList.add('mdg');
  g.dataset.id = p.id;

  const outer = document.createElementNS('http://www.w3.org/2000/svg','circle');
  outer.setAttribute('cx', p.mx); outer.setAttribute('cy', p.my);
  outer.setAttribute('r','8'); outer.setAttribute('fill', p.color);
  outer.setAttribute('opacity','0.18'); outer.classList.add('mdg-outer');

  const inner = document.createElementNS('http://www.w3.org/2000/svg','circle');
  inner.setAttribute('cx', p.mx); inner.setAttribute('cy', p.my);
  inner.setAttribute('r', p.type==='hot' ? '4.5' : '3.8');
  inner.setAttribute('fill', p.color); inner.classList.add('mdg-inner');

  g.appendChild(outer); g.appendChild(inner);
  g.addEventListener('mouseenter', e => showTT(e, p));
  g.addEventListener('mousemove',  moveTT);
  g.addEventListener('mouseleave', hideTT);
  mapDots.appendChild(g);
});

// ── Tooltip ───────────────────────────────────────
const ttEl = document.getElementById('tt');

function showTT(e, p) {
  const pct = Math.round(p.cong * 100);
  const typeStr = p.type === 'hot' ? '인기 장소 (Hot Spot)' : '비인기 장소 (Cold Spot)';
  const barGrad = p.type === 'hot'
    ? 'linear-gradient(to right,#ff3355,#ff6633)'
    : 'linear-gradient(to right,#5544bb,#aa99dd)';
  ttEl.innerHTML = `
    <div class="tt-name">${p.name}</div>
    <div class="tt-row">
      <div class="tt-dot" style="background:${p.color}"></div>
      <div class="tt-lbl">${typeStr}</div>
    </div>
    <div class="tt-bar-bg">
      <div class="tt-bar-fill" id="tt-fill" style="width:0%;background:${barGrad}"></div>
    </div>
    <div class="tt-pct">혼잡도 ${pct}%</div>`;
  ttEl.style.display = 'block';
  requestAnimationFrame(() => {
    ttEl.classList.add('vis');
    const fill = document.getElementById('tt-fill');
    if (fill) fill.style.width = pct + '%';
  });
  moveTT(e);
}
function moveTT(e) {
  if (!ttEl.classList.contains('vis')) return;
  let x = e.clientX + 16, y = e.clientY - 16;
  const w = 210, h = 120;
  if (x+w > window.innerWidth-8) x = e.clientX - w - 14;
  if (y+h > window.innerHeight-8) y = e.clientY - h - 10;
  if (y < 8) y = 8;
  ttEl.style.left = x+'px'; ttEl.style.top = y+'px';
}
function hideTT() {
  ttEl.classList.remove('vis');
  setTimeout(() => { if (!ttEl.classList.contains('vis')) ttEl.style.display='none'; }, 160);
}

// ── 교차 강조 ─────────────────────────────────────
function hlMap(id, on) {
  const g = mapDots.querySelector(`[data-id="${id}"]`);
  if (!g) return;
  const p = pMap[id];
  const inner = g.querySelector('.mdg-inner');
  const outer = g.querySelector('.mdg-outer');
  if (on) { inner.setAttribute('r','7'); outer.setAttribute('r','14'); outer.setAttribute('opacity','0.38'); }
  else    { inner.setAttribute('r', p.type==='hot'?'4.5':'3.8'); outer.setAttribute('r','8'); outer.setAttribute('opacity','0.18'); }
}
mapDots.querySelectorAll('.mdg').forEach(g => {
  const id = g.dataset.id;
  g.addEventListener('mouseenter', () => hlLeft(id, true));
  g.addEventListener('mouseleave', () => hlLeft(id, false));
});
function hlLeft(id, on) {
  const rows = dotChart.querySelectorAll('.place-row');
  const idx = PLACES.findIndex(p => p.id === id);
  if (idx < 0 || !rows[idx]) return;
  const dot = rows[idx].querySelector('.p-dot');
  if (on) { dot.style.transform='scale(1.35)'; dot.style.boxShadow='0 0 8px rgba(255,255,255,0.2)'; }
  else    { dot.style.transform=''; dot.style.boxShadow=''; }
}

// ── Gradient Bar ──────────────────────────────────
const gradBar = document.getElementById('grad-bar');
const barCur  = document.getElementById('bar-cursor');
const barPop  = document.getElementById('bar-pop');
const bpList  = document.getElementById('bp-list');

gradBar.addEventListener('mouseenter', () => { barCur.style.display='block'; barPop.style.display='block'; });
gradBar.addEventListener('mouseleave', () => { barCur.style.display='none';  barPop.style.display='none';  });

let lastIds = '';
gradBar.addEventListener('mousemove', e => {
  const rect = gradBar.getBoundingClientRect();
  const f = Math.max(0, Math.min(1,(e.clientX-rect.left)/rect.width));
  barCur.style.left = (f*100)+'%';
  barPop.style.left = (f*100)+'%';
  if      (f > 0.75) barPop.style.transform = 'translateX(-90%)';
  else if (f < 0.18) barPop.style.transform = 'translateX(-8%)';
  else               barPop.style.transform = 'translateX(-50%)';

  const THR = 0.12;
  const nearby = PLACES
    .filter(p => Math.abs(p.cong - f) < THR)
    .sort((a,b) => Math.abs(a.cong-f)-Math.abs(b.cong-f))
    .slice(0, 8);

  const newIds = nearby.map(p=>p.id).join(',');
  if (newIds === lastIds) return;
  lastIds = newIds;

  bpList.innerHTML = '';
  if (!nearby.length) { barPop.style.display='none'; return; }
  barPop.style.display = 'block';
  nearby.forEach((p,i) => {
    const d = document.createElement('div');
    d.className = 'bp-row';
    d.style.animationDelay = (i*30)+'ms';
    d.innerHTML = `<div class="bp-stick"></div><div class="bp-dot" style="background:${p.color}"></div><div class="bp-nm">${p.name}</div>`;
    bpList.appendChild(d);
  });
});

// ── Hot spot pulse ────────────────────────────────
(function pulse() {
  mapDots.querySelectorAll('.mdg').forEach(g => {
    const p = pMap[g.dataset.id];
    if (!p || p.type !== 'hot') return;
    const outer = g.querySelector('.mdg-outer');
    let t = Math.random() * Math.PI * 2;
    (function tick() {
      t += 0.028;
      outer.setAttribute('opacity',(0.12+Math.sin(t)*0.07).toFixed(3));
      requestAnimationFrame(tick);
    })();
  });
})();
</script>
